<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>XeLauncher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; animation: fadeIn 1s ease-in; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono', monospace; }
  .launcher { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #0a0a0f; }
  .launcher::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a2e 39px, #1a1a2e 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a2e 39px, #1a1a2e 40px); opacity: 0.25; pointer-events: none; z-index: 0; }
  .launcher::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 40%, #0a0a0f 100%); pointer-events: none; z-index: 0; }
  .sys-panel { position: absolute; top: 0; left: 0; right: 0; background: rgba(10,10,15,0.97); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 10px 24px; z-index: 100; display: none; align-items: center; gap: 12px; }
  .sys-panel.visible { display: flex; }
  .sys-btn { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 6px 14px; cursor: pointer; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.6); transition: background 0.15s; }
  .sys-btn.sys-focused { background: rgba(255,255,255,0.15); outline: 1px solid rgba(255,255,255,0.4); }
  .sys-btn.settings { color: #e8d5b0; }
  .sys-close { margin-left: auto; background: transparent; border: none; color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer; font-family: 'Share Tech Mono', monospace; line-height: 1; }
  .sys-close.sys-focused { color: rgba(255,255,255,0.8); outline: 1px solid rgba(255,255,255,0.4); }
  .title-bar { font-family: 'Black Han Sans', sans-serif; color: rgba(232,213,176,0.45); font-size: clamp(9px,1.2vw,12px); letter-spacing: 8px; text-transform: uppercase; margin-bottom: clamp(20px,4vh,40px); position: relative; z-index: 1; }
  .cards { display: flex; gap: clamp(14px,2.5vw,28px); position: relative; z-index: 1; width: clamp(300px,75vw,780px); }
  .card { flex: 1; border: 2px solid; padding: clamp(20px,3.5vh,36px) clamp(16px,2.5vw,28px); cursor: pointer; position: relative; overflow: hidden; transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease; display: flex; flex-direction: column; align-items: center; gap: clamp(12px,2vh,20px); min-height: clamp(180px,30vh,300px); justify-content: center; }
  .card-logo { width: clamp(64px,12vw,130px); height: clamp(64px,12vw,130px); object-fit: contain; transition: transform 0.18s ease, filter 0.18s ease; display: block; }
  .card-label { font-family: 'Black Han Sans', sans-serif; font-size: clamp(16px,2.8vw,26px); letter-spacing: 3px; display: block; transition: color 0.18s; }
  .card-retro { border-color: #c0392b; }
  .card-retro .card-label { color: #e85555; }
  .card-retro.active { background: rgba(192,57,43,0.10); box-shadow: 0 0 60px rgba(192,57,43,0.45), inset 0 0 40px rgba(192,57,43,0.08); transform: scale(1.03) translateY(-3px); }
  .card-retro.active .card-logo { filter: drop-shadow(0 0 10px rgba(220,60,40,0.6)); }
  .card-retro.inactive { background: rgba(192,57,43,0.02); box-shadow: none; filter: grayscale(0.75) brightness(0.5); transform: scale(0.97); }
  .card-jellyfin { border-color: #00a4dc; }
  .card-jellyfin .card-label { color: #00a4dc; }
  .card-jellyfin.active { background: rgba(0,164,220,0.10); box-shadow: 0 0 60px rgba(0,164,220,0.45), inset 0 0 40px rgba(0,164,220,0.08); transform: scale(1.03) translateY(-3px); }
  .card-jellyfin.active .card-logo { filter: drop-shadow(0 0 10px rgba(0,164,220,0.6)); }
  .card-jellyfin.inactive { background: rgba(0,164,220,0.02); box-shadow: none; filter: grayscale(0.75) brightness(0.5); transform: scale(0.97); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay { position: fixed; inset: 0; background: #0a0a0f; z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
  .loading-overlay.visible { display: flex; }
  .loading-spinner { width: 48px; height: 48px; border: 2px solid rgba(0,164,220,0.2); border-top-color: #00a4dc; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 4px; color: rgba(0,164,220,0.6); text-transform: uppercase; }
  .spinning { animation: spin 0.6s linear infinite; }
  .wifi-overlay { position: fixed; inset: 0; background: rgba(8,8,14,0.92); z-index: 200; display: none; align-items: center; justify-content: center; }
  .wifi-overlay.visible { display: flex; }
  .wifi-panel { width: clamp(320px,55vw,700px); display: flex; flex-direction: column; gap: clamp(10px,1.5vh,20px); font-family: 'Share Tech Mono', monospace; }
  .wifi-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,164,220,0.2); padding-bottom: 10px; }
  .wifi-title { font-family: 'Black Han Sans', sans-serif; color: rgba(0,164,220,0.8); font-size: clamp(12px,1.5vw,18px); letter-spacing: 5px; text-transform: uppercase; }
  .wifi-status { font-size: clamp(9px,1vw,12px); letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
  .wifi-status.connected { color: #a5d6a7; }
  .wifi-list { display: flex; flex-direction: column; gap: 6px; max-height: clamp(200px,40vh,400px); overflow-y: auto; }
  .wifi-network { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.15s; }
  .wifi-network.focused { background: rgba(0,164,220,0.12); border-color: #00a4dc; }
  .wifi-network.current { border-color: rgba(165,214,167,0.5); }
  .wifi-network-name { font-size: clamp(10px,1.2vw,14px); letter-spacing: 2px; color: rgba(255,255,255,0.7); text-transform: uppercase; }
  .wifi-network.focused .wifi-network-name { color: #00a4dc; }
  .wifi-network.current .wifi-network-name { color: #a5d6a7; }
  .wifi-network-info { display: flex; align-items: center; gap: 10px; font-size: clamp(9px,1vw,11px); color: rgba(255,255,255,0.3); }
  .wifi-signal { color: rgba(0,164,220,0.6); }
  .wifi-hide-btn { background: transparent; border: none; color: rgba(255,255,255,0.2); cursor: pointer; font-size: 14px; padding: 0 4px; line-height: 1; transition: color 0.15s; }
  .wifi-network.focused .wifi-hide-btn { color: rgba(192,57,43,0.6); }
  .wifi-show-hidden { text-align: center; padding: 8px; font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.25); cursor: pointer; border: 1px dashed rgba(255,255,255,0.1); margin-top: 4px; transition: all 0.15s; }
  .wifi-show-hidden:hover, .wifi-show-hidden.focused { color: rgba(0,164,220,0.6); border-color: rgba(0,164,220,0.3); }
  .wifi-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .wifi-action-btn { font-family: 'Share Tech Mono', monospace; font-size: clamp(9px,1vw,11px); letter-spacing: 2px; text-transform: uppercase; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); padding: 6px 14px; cursor: pointer; transition: all 0.15s; outline: none; }
  .wifi-action-btn.focused { border-color: rgba(0,164,220,0.6); color: #00a4dc; background: rgba(0,164,220,0.08); }
  .wifi-action-btn.danger.focused { border-color: rgba(192,57,43,0.6); color: #e85555; background: rgba(192,57,43,0.08); }
  .wifi-hint { font-size: clamp(8px,0.9vw,10px); letter-spacing: 2px; color: rgba(255,255,255,0.18); text-align: center; text-transform: uppercase; }
  .wifi-pwd-overlay { position: fixed; inset: 0; background: rgba(8,8,14,0.95); z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: clamp(14px,2.5vh,32px); gap: clamp(10px,1.5vh,20px); }
  .wifi-pwd-overlay.visible { display: flex; }
  .wifi-pwd-title { font-family: 'Black Han Sans', sans-serif; color: rgba(0,164,220,0.7); font-size: clamp(10px,1.2vw,14px); letter-spacing: 5px; text-transform: uppercase; }
  .wifi-pwd-field { background: #0d0d18; border: 1px solid rgba(0,164,220,0.45); color: #00a4dc; font-family: 'Share Tech Mono', monospace; font-size: clamp(14px,2vw,22px); letter-spacing: 3px; padding: 10px 32px; min-width: clamp(240px,38vw,520px); text-align: center; }
  .wifi-kb-panel { width: clamp(320px,72vw,860px); display: flex; flex-direction: column; gap: clamp(4px,0.7vh,9px); }
  .wifi-kb-top { display: flex; justify-content: center; gap: 12px; margin-bottom: 6px; }
  .wifi-kb-mode-btn { font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; background: transparent; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.3); padding: 5px 16px; cursor: pointer; transition: all 0.15s; outline: none; }
  .wifi-kb-mode-btn.on { border-color: rgba(0,164,220,0.5); color: rgba(0,164,220,0.8); }
  .wifi-kb-mode-btn.active { border-color: #00a4dc; color: #00a4dc; background: rgba(0,164,220,0.15); }
  .wifi-kb-row { display: grid; gap: clamp(3px,0.45vw,7px); }
  .wifi-kb-key { height: clamp(28px,4.2vh,50px); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.11); color: rgba(255,255,255,0.5); font-family: 'Share Tech Mono', monospace; font-size: clamp(10px,1.2vw,14px); display: flex; align-items: center; justify-content: center; cursor: pointer; text-transform: uppercase; transition: all 0.1s; }
  .wifi-kb-key.active { background: rgba(0,164,220,0.18); border-color: #00a4dc; color: #00a4dc; transform: scale(1.08); }
  .wifi-kb-key.invisible { visibility: hidden; pointer-events: none; }
  .wifi-kb-key.confirm { border-color: rgba(0,164,220,0.3); color: rgba(0,164,220,0.65); }
  .wifi-kb-key.confirm.active { background: rgba(0,164,220,0.22); border-color: #00a4dc; color: #00a4dc; }
  .wifi-kb-key.shift-on { border-color: rgba(255,200,0,0.5); color: rgba(255,200,0,0.8); }

  /* Menu Power (Start / Options) */
  .power-overlay { position: fixed; inset: 0; background: rgba(8,8,14,0.93); z-index: 450; display: none; align-items: center; justify-content: center; }
  .power-overlay.visible { display: flex; }
  .power-panel { width: clamp(260px,38vw,420px); display: flex; flex-direction: column; gap: clamp(10px,1.5vh,20px); font-family: 'Share Tech Mono', monospace; }
  .power-title { font-family: 'Black Han Sans', sans-serif; color: rgba(232,213,176,0.7); font-size: clamp(12px,1.5vw,16px); letter-spacing: 6px; text-transform: uppercase; border-bottom: 1px solid rgba(232,213,176,0.2); padding-bottom: 10px; text-align: center; }
  .power-btn { display: flex; align-items: center; gap: 14px; padding: 14px 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-family: 'Share Tech Mono', monospace; font-size: clamp(11px,1.3vw,15px); letter-spacing: 3px; color: rgba(255,255,255,0.55); text-transform: uppercase; transition: all 0.15s; }
  .power-btn.focused { background: rgba(192,57,43,0.15); border-color: rgba(192,57,43,0.6); color: #e85555; }
  .power-btn.focused.restart { background: rgba(255,200,0,0.1); border-color: rgba(255,200,0,0.5); color: rgba(255,200,0,0.9); }
  .power-btn.cancel.focused { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.8); }
  .power-icon { font-size: 18px; }
  .power-hint { font-size: clamp(8px,0.9vw,10px); letter-spacing: 2px; color: rgba(255,255,255,0.18); text-align: center; text-transform: uppercase; }
</style>
</head>

<div class="launcher" id="launcher">
  <div class="sys-panel" id="sysPanel">
    <button class="sys-btn settings" id="settingsBtn">

<script>

var current = 0;
var konamiIdx = 0;
var konamiSeq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight'];
var sysFocus = -1;
var powerFocus = 0; // 0=restart, 1=shutdown, 2=cancel

function selectCard(idx) {
  document.getElementById('card0').className = 'card card-retro ' + (idx===0?'active':'inactive');
  document.getElementById('card1').className = 'card card-jellyfin ' + (idx===1?'active':'inactive');
  current = idx;
}
document.getElementById('card0').onclick = function(){ selectCard(0); };
document.getElementById('card1').onclick = function(){ selectCard(1); };

function updateSysFocus() {
  ['settingsBtn','closeBtn'].forEach(function(id,i) {
    var el = document.getElementById(id);
    if(el) el.classList.toggle('sys-focused', i===sysFocus);
  });
}
function openSysPanel() {
  document.getElementById('sysPanel').classList.add('visible');
  sysFocus = -1; updateSysFocus();
}
function closeSysPanel() {
  document.getElementById('sysPanel').classList.remove('visible');
  sysFocus = -1; updateSysFocus();
}

document.getElementById('settingsBtn').onclick = openSettings;
document.getElementById('closeBtn').onclick = closeSysPanel;

// ── Page Paramètres ─────────────────────────────────────────────────────────
function openSettings() {
  closeSysPanel();
  if(window.xeLauncher && window.xeLauncher.openSettings)
    window.xeLauncher.openSettings();
  else
    window.location.href = 'settings.html';
}


// ── Menu Power (Start / bouton Options télécommande) ──────────────────────
var POWER_ITEMS = ['powerRestart','powerShutdown','powerCancel'];
function updatePowerFocus() {
  POWER_ITEMS.forEach(function(id,i){
    document.getElementById(id).classList.toggle('focused', i===powerFocus);
  });
}
function openPowerMenu() {
  powerFocus = 0; updatePowerFocus();
  document.getElementById('powerOverlay').classList.add('visible');
}
function closePowerMenu() { document.getElementById('powerOverlay').classList.remove('visible'); }
function powerAction(idx) {
  closePowerMenu();
  if(idx === 0) {
    // Redémarrer
    document.getElementById('loadingOverlay').classList.add('visible');
    document.getElementById('loadingText').textContent = 'Redémarrage...';
    if(window.xeLauncher && window.xeLauncher.systemReboot)
      window.xeLauncher.systemReboot();
  } else if(idx === 1) {
    // Éteindre
    document.getElementById('loadingOverlay').classList.add('visible');
    document.getElementById('loadingText').textContent = 'Arrêt en cours...';
    if(window.xeLauncher && window.xeLauncher.systemShutdown)
      window.xeLauncher.systemShutdown();
  }
}

// WiFi liste
var wifiNetworks=[], wifiFocusIdx=0, currentSSID='';
var hiddenNetworks=JSON.parse(localStorage.getItem?localStorage.getItem('hiddenWifi')||'[]':'[]');
var showHiddenWifi=false;

function openWifiMenu() {
  document.getElementById('wifiOverlay').classList.add('visible');
  wifiFocusIdx=0; scanWifi();
}
function closeWifiMenu() { document.getElementById('wifiOverlay').classList.remove('visible'); }
// WiFi accessible depuis les paramètres


function scanWifi() {
  if(!window.xeLauncher || !window.xeLauncher.wifiScan) return;
  var s=document.getElementById('wifiCurrentStatus'); s.textContent='Scan...'; s.className='wifi-status';
  window.xeLauncher.wifiScan().then(function(nets) {
    wifiNetworks=nets||[];
    window.xeLauncher.wifiCurrentSSID().then(function(ssid) {
      currentSSID=ssid||'';
      if(currentSSID){s.textContent='● '+currentSSID;s.className='wifi-status connected';}
      else{s.textContent='Non connecte';s.className='wifi-status';}
      renderWifiList();
    });
  }).catch(function(e){ console.error('wifiScan error:', e); });
}
function saveHiddenNetworks(){
  try{localStorage.setItem('hiddenWifi',JSON.stringify(hiddenNetworks));}catch(e){}
}
function hideNetwork(){
  if(!wifiNetworks.length)return;
  var net=wifiNetworks[wifiFocusIdx]; if(!net)return;
  if(hiddenNetworks.indexOf(net.ssid)<0) hiddenNetworks.push(net.ssid);
  saveHiddenNetworks();
  scanWifi();
}
function renderWifiList() {
  var c=document.getElementById('wifiList'); c.innerHTML='';
  if(!wifiNetworks.length){c.innerHTML='<div class="wifi-network"><span class="wifi-network-name">Aucun reseau</span></div>';return;}
  wifiNetworks.forEach(function(net,i) {
    var el=document.createElement('div');
    el.className='wifi-network'+(i===wifiFocusIdx?' focused':'')+(net.ssid===currentSSID?' current':'');
    var sig=parseInt(net.signal||0), bars=sig>66?'|||':sig>33?'||_':'|__';
    el.innerHTML='<span class="wifi-network-name">'+net.ssid+'</span><span class="wifi-network-info"><span class="wifi-signal">'+bars+'</span>'+(net.ssid===currentSSID?'<span style="color:#a5d6a7">*</span>':'')+'</span>';
    el.onclick=function(){wifiFocusIdx=i;renderWifiList();connectToNetwork();};
    c.appendChild(el);
  });

}
function connectToNetwork() {
  if(!wifiNetworks.length)return;
  var net=wifiNetworks[wifiFocusIdx];
  if(!net||net.ssid===currentSSID)return;
  // Vérifier si le réseau est déjà connu (sécurisé = demander mdp, sinon connecter direct)
  if(net.security && net.security.trim() !== '' && net.security !== 'WPA3') {
    openWifiPwd(net.ssid);
  } else {
    // Réseau ouvert - connexion directe sans mdp
    var s=document.getElementById('wifiCurrentStatus');
    s.textContent='Connexion...'; s.className='wifi-status';
    if(!window.xeLauncher||!window.xeLauncher.wifiConnect) return;
    window.xeLauncher.wifiConnect(net.ssid,'').then(function(ok){
      if(ok){currentSSID=net.ssid;s.textContent='● '+net.ssid;s.className='wifi-status connected';}
      else{s.textContent='Echec';s.className='wifi-status';}
      renderWifiList();
    });
  }
}
function forgetNetwork() {
  if(!wifiNetworks.length)return;
  var net=wifiNetworks[wifiFocusIdx]; if(!net)return;
  if(!window.xeLauncher||!window.xeLauncher.wifiForget) return;
  window.xeLauncher.wifiForget(net.ssid).then(function(){scanWifi();});
}

// WiFi clavier
var wifiPwdVal='',wifiKbMode='letters',wifiKbCaps=false,wifiKbSection='kb',wifiKbTopFocus=0,wifiKbRow=0,wifiKbCol=0;
var WIFI_COLS=10;
var WIFI_LAYOUTS={
  letters:[
    ['a','z','e','r','t','y','u','i','o','p'],
    ['q','s','d','f','g','h','j','k','l','m'],
    [null,'w','x','c','v','b','n',',','.',null]
  ],
  nums:[
    ['1','2','3','4','5','6','7','8','9','0'],
    ['!','@','#','$','%','^','&','*','(',')'],
    [null,'-','_','=','+','[',']','{','}',null]
  ]
};
var WIFI_BOTTOM=[{label:'SHIFT',col:0,span:2},{label:'ESPACE',col:2,span:4},{label:'<',col:6,span:2},{label:'OK',col:8,span:2}];

function openWifiPwd(ssid) {
  wifiPwdVal='';wifiKbMode='letters';wifiKbCaps=false;wifiKbSection='kb';wifiKbRow=0;wifiKbCol=0;wifiKbTopFocus=0;
  document.getElementById('wifiPwdTitle').textContent=ssid;
  document.getElementById('wifiPwdDisplay').textContent='|';
  document.getElementById('wifiPwdOverlay').classList.add('visible');
  renderWifiKb();
}
function closeWifiPwd() { document.getElementById('wifiPwdOverlay').classList.remove('visible'); }

function wifiKbNearestCol(ri,col) {
  var layout=WIFI_LAYOUTS[wifiKbMode];
  if(ri===layout.length){var best=0,bestD=999;WIFI_BOTTOM.forEach(function(b){var mid=b.col+Math.floor(b.span/2);var d=Math.abs(mid-col);if(d<bestD){bestD=d;best=b.col;}});return best;}
  var row=layout[ri]; if(row[col]!==null)return col;
  var best=col,bestD=999;for(var c=0;c<WIFI_COLS;c++){if(row[c]!==null){var d=Math.abs(c-col);if(d<bestD){bestD=d;best=c;}}}return best;
}
function renderWifiKb() {
  var layout=WIFI_LAYOUTS[wifiKbMode];
  var container=document.getElementById('wifiKbRows'); container.innerHTML='';
  layout.forEach(function(row,ri){
    var rowEl=document.createElement('div'); rowEl.className='wifi-kb-row'; rowEl.style.gridTemplateColumns='repeat(10,1fr)';
    row.forEach(function(key,ci){
      var btn=document.createElement('div');
      var isActive=wifiKbSection==='kb'&&wifiKbRow===ri&&wifiKbCol===ci;
      btn.className='wifi-kb-key'+(key===null?' invisible':'')+(isActive?' active':'');
      if(key!==null)btn.textContent=wifiKbCaps&&key.length===1?key.toUpperCase():key;
      if(key!==null)(function(r,c){btn.onclick=function(){wifiKbSection='kb';wifiKbRow=r;wifiKbCol=c;wifiKbPressKey();};})(ri,ci);
      rowEl.appendChild(btn);
    });
    container.appendChild(rowEl);
  });
  var bottomEl=document.createElement('div'); bottomEl.className='wifi-kb-row'; bottomEl.style.gridTemplateColumns='repeat(10,1fr)';
  var bri=layout.length;
  WIFI_BOTTOM.forEach(function(b,bi){
    var btn=document.createElement('div');
    var isActive=wifiKbSection==='kb'&&wifiKbRow===bri&&wifiKbCol===b.col;
    btn.className='wifi-kb-key'+(b.label==='OK'?' confirm':'')+(b.label==='SHIFT'&&wifiKbCaps?' shift-on':'')+(isActive?' active':'');
    btn.style.gridColumn=(b.col+1)+'/span '+b.span;
    btn.textContent=b.label;
    (function(bidx){btn.onclick=function(){wifiKbSection='kb';wifiKbRow=bri;wifiKbCol=WIFI_BOTTOM[bidx].col;wifiKbPressBottom(bidx);};})(bi);
    bottomEl.appendChild(btn);
  });
  container.appendChild(bottomEl);
  document.getElementById('wifiModeLetters').className='wifi-kb-mode-btn'+(wifiKbMode==='letters'?' on':'')+(wifiKbSection==='top'&&wifiKbTopFocus===0?' active':'');
  document.getElementById('wifiModeNums').className='wifi-kb-mode-btn'+(wifiKbMode==='nums'?' on':'')+(wifiKbSection==='top'&&wifiKbTopFocus===1?' active':'');
}
function wifiKbPressKey() {
  var layout=WIFI_LAYOUTS[wifiKbMode];
  if(wifiKbRow===layout.length){var bi=0;WIFI_BOTTOM.forEach(function(b,i){if(wifiKbCol>=b.col&&wifiKbCol<b.col+b.span)bi=i;});wifiKbPressBottom(bi);return;}
  var key=layout[wifiKbRow][wifiKbCol];
  if(key)wifiPwdVal+=wifiKbCaps?key.toUpperCase():key;
  updateWifiPwdDisplay();renderWifiKb();
}
function wifiKbPressBottom(bi) {
  var lbl=WIFI_BOTTOM[bi].label;
  if(lbl==='SHIFT'){wifiKbCaps=!wifiKbCaps;}
  else if(lbl==='ESPACE'){wifiPwdVal+=' ';}
  else if(lbl==='<'){wifiPwdVal=wifiPwdVal.slice(0,-1);}
  else if(lbl==='OK'){
    var ssid=document.getElementById('wifiPwdTitle').textContent, pwd=wifiPwdVal;
    closeWifiPwd();
    var s=document.getElementById('wifiCurrentStatus'); s.textContent='Connexion...'; s.className='wifi-status';
    // Essayer d'abord de se connecter avec le profil existant
    if(!window.xeLauncher||!window.xeLauncher.wifiConnect) return;
    window.xeLauncher.wifiConnect(ssid,pwd).then(function(ok){
      if(ok){currentSSID=ssid;s.textContent='● '+ssid;s.className='wifi-status connected';}
      else{s.textContent='Echec';s.className='wifi-status';}
      renderWifiList();
    });
    return;
  }
  updateWifiPwdDisplay();renderWifiKb();
}
function wifiSetMode(m){wifiKbMode=m;wifiKbSection='kb';wifiKbRow=0;wifiKbCol=wifiKbNearestCol(0,0);renderWifiKb();}
document.getElementById('wifiModeLetters').onclick=function(){wifiSetMode('letters');};
document.getElementById('wifiModeNums').onclick=function(){wifiSetMode('nums');};
function updateWifiPwdDisplay(){document.getElementById('wifiPwdDisplay').textContent=(wifiPwdVal||'')+'|';}

// Navigation unifiee
function handleKey(key) {
  // ── Menu Power ───────────────────────────────────────────────────────────
  if(document.getElementById('powerOverlay').classList.contains('visible')) {
    if(key==='ArrowUp')   { powerFocus=(powerFocus-1+3)%3; updatePowerFocus(); }
    else if(key==='ArrowDown') { powerFocus=(powerFocus+1)%3; updatePowerFocus(); }
    else if(key==='Enter') {
      if(powerFocus===0) powerAction(0);
      else if(powerFocus===1) powerAction(1);
      else closePowerMenu();
    }
    else if(key==='Escape'||key==='Start'||key==='Options') closePowerMenu();
    return;
  }
  if(document.getElementById('wifiPwdOverlay').classList.contains('visible')){
    var layout=WIFI_LAYOUTS[wifiKbMode], maxRow=layout.length;
    if(key==='ArrowUp'){if(wifiKbSection==='kb'&&wifiKbRow===0)wifiKbSection='top';else if(wifiKbSection==='kb'){wifiKbRow--;wifiKbCol=wifiKbNearestCol(wifiKbRow,wifiKbCol);}renderWifiKb();}
    else if(key==='ArrowDown'){if(wifiKbSection==='top'){wifiKbSection='kb';wifiKbRow=0;wifiKbCol=wifiKbNearestCol(0,wifiKbCol);}else if(wifiKbRow<maxRow){wifiKbRow++;wifiKbCol=wifiKbNearestCol(wifiKbRow,wifiKbCol);}renderWifiKb();}
    else if(key==='ArrowLeft'){
      if(wifiKbSection==='top'){wifiKbTopFocus=(wifiKbTopFocus-1+2)%2;}
      else if(wifiKbRow===maxRow){var bi=0;WIFI_BOTTOM.forEach(function(b,i){if(wifiKbCol>=b.col&&wifiKbCol<b.col+b.span)bi=i;});wifiKbCol=WIFI_BOTTOM[(bi-1+WIFI_BOTTOM.length)%WIFI_BOTTOM.length].col;}
      else{var nc=(wifiKbCol-1+WIFI_COLS)%WIFI_COLS,tr=0;while(layout[wifiKbRow][nc]===null&&tr<WIFI_COLS){nc=(nc-1+WIFI_COLS)%WIFI_COLS;tr++;}wifiKbCol=nc;}
      renderWifiKb();
    }
    else if(key==='ArrowRight'){
      if(wifiKbSection==='top'){wifiKbTopFocus=(wifiKbTopFocus+1)%2;}
      else if(wifiKbRow===maxRow){var bi=0;WIFI_BOTTOM.forEach(function(b,i){if(wifiKbCol>=b.col&&wifiKbCol<b.col+b.span)bi=i;});wifiKbCol=WIFI_BOTTOM[(bi+1)%WIFI_BOTTOM.length].col;}
      else{var nc=(wifiKbCol+1)%WIFI_COLS,tr=0;while(layout[wifiKbRow][nc]===null&&tr<WIFI_COLS){nc=(nc+1)%WIFI_COLS;tr++;}wifiKbCol=nc;}
      renderWifiKb();
    }
    else if(key==='Enter'){if(wifiKbSection==='top')wifiSetMode(wifiKbTopFocus===0?'letters':'nums');else wifiKbPressKey();}
    else if(key==='Escape'){closeWifiPwd();}
    return;
  }
  if(document.getElementById('wifiOverlay').classList.contains('visible')){
    var visibleNets=wifiNetworks.filter(function(n){return showHiddenWifi||hiddenNetworks.indexOf(n.ssid)<0;});
    var maxIdx=visibleNets.length+(hiddenNetworks.length>0?1:0)-1;
    if(key==='ArrowUp'){wifiFocusIdx=Math.max(0,wifiFocusIdx-1);renderWifiList();}
    else if(key==='ArrowDown'){if(wifiFocusIdx<maxIdx){wifiFocusIdx++;renderWifiList();}}
    else if(key==='Enter'){
      if(hiddenNetworks.length>0&&wifiFocusIdx===visibleNets.length){showHiddenWifi=!showHiddenWifi;wifiFocusIdx=0;renderWifiList();}
      else{connectToNetwork();}
    }
    else if(key==='Triangle'||key==='Delete'){hideNetwork();}
    else if(key==='Escape'){closeWifiMenu();}
    return;
  }
  if(document.getElementById('sysPanel').classList.contains('visible')){
    if(sysFocus>=0){
      if(key==='ArrowLeft'){sysFocus=Math.max(0,sysFocus-1);updateSysFocus();}
      else if(key==='ArrowRight'){sysFocus=Math.min(1,sysFocus+1);updateSysFocus();}
      else if(key==='ArrowDown'){sysFocus=-1;updateSysFocus();}
      else if(key==='Enter'){if(sysFocus===0)openSettings();else closeSysPanel();}
      else if(key==='Escape'){closeSysPanel();}
      else if(key==='Start'||key==='Options'){closeSysPanel();openPowerMenu();}
    } else {
      // sysFocus==-1 = cartes sélectionnées, panneau affiché mais pas focus
      if(key==='ArrowUp'){sysFocus=0;updateSysFocus();}
      else if(key==='ArrowLeft')selectCard(0);
      else if(key==='ArrowRight')selectCard(1);
      else if(key==='Enter'){if(!window.xeLauncher)return;if(current===0)window.xeLauncher.launchRetropie();else { document.getElementById('loadingOverlay').classList.add('visible'); document.getElementById('loadingText').textContent='Demarrage Tailscale...'; window.xeLauncher.launchJellyfin().then(function(){ document.getElementById('loadingOverlay').classList.remove('visible'); }); }}
      else if(key==='Escape'){closeSysPanel();}
      else if(key==='Start'||key==='Options'){closeSysPanel();openPowerMenu();}
      if(key===konamiSeq[konamiIdx]){konamiIdx++;if(konamiIdx===konamiSeq.length){openSysPanel();konamiIdx=0;}}else{konamiIdx=0;}
    }
    return;
  }
  if(key==='ArrowLeft')selectCard(0);
  else if(key==='ArrowRight')selectCard(1);
  else if(key==='Enter'){if(!window.xeLauncher)return;if(current===0)window.xeLauncher.launchRetropie();else { document.getElementById('loadingOverlay').classList.add('visible'); document.getElementById('loadingText').textContent='Demarrage Tailscale...'; window.xeLauncher.launchJellyfin().then(function(){ document.getElementById('loadingOverlay').classList.remove('visible'); }); }}
  else if(key==='Start'||key==='Options') openPowerMenu();
  if(key===konamiSeq[konamiIdx]){konamiIdx++;if(konamiIdx===konamiSeq.length){openSysPanel();konamiIdx=0;}}else{konamiIdx=0;}
}

var inputReady = false; setTimeout(function(){ inputReady = true; }, 800);
document.addEventListener('keydown', function(e){ if(inputReady) handleKey(e.key); });

// Wiimote D-pad via evdev IPC (croix non visible par l'API Gamepad)
if(window.xeLauncher && window.xeLauncher.onWiimoteDpad){
  window.xeLauncher.onWiimoteDpad(function(evt){ if(inputReady) handleKey(evt.key); });
}

// Gamepad
var gamepadState={};
var gpPollingMenu=false;

function startGpPollMenu(){
  if(gpPollingMenu) return;
  gpPollingMenu=true;
  requestAnimationFrame(pollGamepad);
}

function pollGamepad(){
  var gps=navigator.getGamepads?navigator.getGamepads():[];
  for(var i=0;i<gps.length;i++){
    var gp=gps[i]; if(!gp)continue;
    if(!gamepadState[i])gamepadState[i]={buttons:[],acH:false,acV:false};
    var st=gamepadState[i];
    gp.buttons.forEach(function(btn,idx){
      var p=btn.pressed,w=st.buttons[idx];
      if(p&&!w&&inputReady){
        if(idx===0) handleKey('Enter');
        if(idx===1) handleKey('Escape');
        if(idx===3) handleKey('Triangle');
        if(idx===8) handleKey('Options');
        if(idx===9) handleKey('Start');
        // idx 12-15 (D-pad HAT) gérés exclusivement via evdev IPC
      }
      st.buttons[idx]=p;
    });
    var T=0.4;
    var axH=0, axVraw=0;
    if(Math.abs(gp.axes[0])>T) axH=gp.axes[0];
    else if(gp.axes[6]!==undefined&&Math.abs(gp.axes[6])>T) axH=gp.axes[6];
    if(Math.abs(gp.axes[1])>T) axVraw=gp.axes[1];
    else if(gp.axes[7]!==undefined&&Math.abs(gp.axes[7])>T) axVraw=gp.axes[7];
    if(!st.acH){
      if(axH<-T){ handleKey('ArrowLeft');  st.acH=true; setTimeout(function(){st.acH=false;},200); }
      else if(axH>T){ handleKey('ArrowRight'); st.acH=true; setTimeout(function(){st.acH=false;},200); }
    }
    if(axH===0) st.acH=false;
    if(!st.acV){
      if(axVraw<-T){ handleKey('ArrowUp');   st.acV=true; setTimeout(function(){st.acV=false;},200); }
      else if(axVraw>T){ handleKey('ArrowDown'); st.acV=true; setTimeout(function(){st.acV=false;},200); }
    }
    if(axVraw===0) st.acV=false;
  }
  requestAnimationFrame(pollGamepad);
}
window.addEventListener('gamepadconnected',function(e){
  gamepadState[e.gamepad.index]={buttons:[],acH:false,acV:false};
  startGpPollMenu();
});
window.addEventListener('gamepaddisconnected',function(e){
  delete gamepadState[e.gamepad.index];
});
setTimeout(startGpPollMenu, 500);

</script>

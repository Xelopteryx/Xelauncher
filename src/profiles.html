<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>XeLauncher — Profils</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; min-height: 100vh; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
  .launcher { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .launcher::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a2e 39px, #1a1a2e 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a2e 39px, #1a1a2e 40px); opacity: 0.22; pointer-events: none; z-index: 0; }
  .launcher::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 35%, #0a0a0f 100%); pointer-events: none; z-index: 0; }
  .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: clamp(24px,5vh,52px); }
  .header-row { position: relative; display: flex; align-items: center; justify-content: center; }
  .back-btn { position: absolute; right: calc(100% + clamp(12px,2vw,28px)); top: -10px; display: flex; align-items: center; gap: 8px; background: transparent; border: 1px solid rgba(0,164,220,0.25); color: rgba(0,164,220,0.5); font-family: 'Share Tech Mono', monospace; font-size: clamp(10px,1.1vw,13px); letter-spacing: 2px; padding: 7px 16px; cursor: pointer; text-transform: uppercase; transition: all 0.18s; outline: none; }
  .back-btn.active { border-color: rgba(0,164,220,0.7); color: #00a4dc; background: rgba(0,164,220,0.07); }
  .header-info { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .header-info img { width: clamp(32px,4vw,52px); height: clamp(32px,4vw,52px); object-fit: contain; opacity: 0.85; }
  .header-title { font-family: 'Black Han Sans', sans-serif; color: rgba(0,164,220,0.7); font-size: clamp(9px,1.1vw,13px); letter-spacing: 7px; text-transform: uppercase; }
  .profiles-grid { display: flex; flex-wrap: wrap; gap: clamp(20px,3vw,48px); justify-content: center; align-items: center; max-width: 90vw; }
  .profile-card { display: flex; flex-direction: column; align-items: center; gap: 14px; cursor: pointer; transition: transform 0.18s, filter 0.18s; outline: none; position: relative; }
  .avatar-wrap { width: clamp(90px,13vw,150px); height: clamp(90px,13vw,150px); }
  .avatar-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid rgba(0,164,220,0.2); display: block; transition: border-color 0.18s, box-shadow 0.18s; }
  .profile-name { font-family: 'Share Tech Mono', monospace; font-size: clamp(11px,1.3vw,14px); letter-spacing: 2px; color: rgba(255,255,255,0.35); text-align: center; transition: color 0.18s; text-transform: uppercase; }
  .profile-card.active .avatar-wrap img { border-color: #00a4dc; }
  .profile-card.active .profile-name { color: #00a4dc; }
  .profile-card.active { transform: scale(1.08) translateY(-4px); filter: none; }
  .profile-card.inactive { filter: grayscale(0.7) brightness(0.5); transform: scale(0.95); }
  .avatar-placeholder { width: 100%; height: 100%; border-radius: 50%; border: 2px dashed rgba(255,255,255,0.18); background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; transition: all 0.18s; }
  .plus-icon { font-size: clamp(45px,6.5vw,75px); line-height: 1; color: rgba(255,255,255,0.22); font-family: 'Share Tech Mono', monospace; margin-top: -4px; }
  .profile-add.active .avatar-placeholder { border-color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.05); }
  .profile-add.active .plus-icon { color: rgba(255,255,255,0.75); }
  .profile-add.active .profile-name { color: rgba(255,255,255,0.65); }
  .hint-bar { font-size: clamp(8px,0.9vw,11px); letter-spacing: 2px; color: rgba(255,255,255,0.2); text-transform: uppercase; text-align: center; }
  .status-msg { position: fixed; bottom: clamp(20px,4vh,48px); left: 50%; transform: translateX(-50%); background: rgba(0,164,220,0.10); border: 1px solid rgba(0,164,220,0.3); color: #00a4dc; font-size: 12px; letter-spacing: 2px; padding: 8px 22px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10; white-space: nowrap; text-transform: uppercase; }
  .status-msg.show { opacity: 1; }
  .status-msg.error { border-color: rgba(192,57,43,0.4); color: #e85555; background: rgba(192,57,43,0.08); }

  /* Overlay éditeur de profil */
  .editor-overlay { position: fixed; inset: 0; background: rgba(8,8,14,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; gap: clamp(16px,3vh,32px); }
  .editor-overlay.visible { display: flex; }
  .editor-title { font-family: 'Black Han Sans', sans-serif; color: rgba(0,164,220,0.8); font-size: clamp(12px,1.5vw,18px); letter-spacing: 5px; text-transform: uppercase; }
  .editor-avatar-preview { width: clamp(80px,12vw,130px); height: clamp(80px,12vw,130px); border-radius: 50%; object-fit: cover; border: 2px solid rgba(0,164,220,0.4); }
  .editor-fields { display: flex; flex-direction: column; gap: 12px; width: clamp(280px,40vw,500px); }
  .editor-field { display: flex; flex-direction: column; gap: 6px; }
  .editor-label { font-size: 10px; letter-spacing: 3px; color: rgba(0,164,220,0.5); text-transform: uppercase; }
  .editor-input { background: #0d0d18; border: 1px solid rgba(0,164,220,0.3); color: rgba(255,255,255,0.8); font-family: 'Share Tech Mono', monospace; font-size: 14px; padding: 8px 14px; outline: none; }
  .editor-input.focused { border-color: #00a4dc; color: #fff; }
  .editor-actions { display: flex; gap: 12px; }
  .editor-btn { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); padding: 8px 20px; cursor: pointer; transition: all 0.15s; outline: none; }
  .editor-btn.focused { border-color: rgba(0,164,220,0.6); color: #00a4dc; background: rgba(0,164,220,0.08); }
  .editor-btn.danger.focused { border-color: rgba(192,57,43,0.6); color: #e85555; background: rgba(192,57,43,0.08); }
  .editor-hint { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.18); text-transform: uppercase; }

  /* Overlay sélection avatar */
  .avatar-picker { position: fixed; inset: 0; background: rgba(8,8,14,0.97); z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  .avatar-picker.visible { display: flex; }
  .avatar-picker-title { font-family: 'Black Han Sans', sans-serif; color: rgba(0,164,220,0.8); font-size: clamp(12px,1.5vw,16px); letter-spacing: 5px; text-transform: uppercase; }
  .avatar-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; max-width: 80vw; max-height: 60vh; overflow-y: auto; }
  .avatar-thumb { width: clamp(60px,8vw,100px); height: clamp(60px,8vw,100px); border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.15s; }
  .avatar-thumb.focused { border-color: #00a4dc; box-shadow: 0 0 0 3px rgba(0,164,220,0.25); transform: scale(1.1); }
  .avatar-empty { color: rgba(255,255,255,0.3); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }
  .avatar-picker-hint { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.18); text-transform: uppercase; }

  /* Overlay clavier virtuel */
  .kb-overlay { position: fixed; inset: 0; background: rgba(8,8,14,0.97); z-index: 400; display: none; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: clamp(14px,2.5vh,32px); gap: clamp(8px,1.5vh,16px); }
  .kb-overlay.visible { display: flex; }
  .kb-field-label { font-family: 'Black Han Sans', sans-serif; color: rgba(0,164,220,0.7); font-size: 12px; letter-spacing: 4px; text-transform: uppercase; }
  .kb-field-value { background: #0d0d18; border: 1px solid rgba(0,164,220,0.45); color: #00a4dc; font-family: 'Share Tech Mono', monospace; font-size: clamp(14px,2vw,20px); letter-spacing: 3px; padding: 10px 32px; min-width: clamp(240px,38vw,520px); text-align: center; }
  .kb-panel { width: clamp(320px,72vw,860px); display: flex; flex-direction: column; gap: clamp(4px,0.7vh,9px); }
  .kb-top { display: flex; justify-content: center; gap: 12px; margin-bottom: 6px; }
  .kb-mode-btn { font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; background: transparent; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.3); padding: 5px 16px; cursor: pointer; transition: all 0.15s; outline: none; }
  .kb-mode-btn.on { border-color: rgba(0,164,220,0.5); color: rgba(0,164,220,0.8); }
  .kb-mode-btn.kbactive { border-color: #00a4dc; color: #00a4dc; background: rgba(0,164,220,0.15); }
  .kb-row { display: grid; gap: clamp(3px,0.45vw,7px); }
  .kb-key { height: clamp(28px,4.2vh,50px); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.11); color: rgba(255,255,255,0.5); font-family: 'Share Tech Mono', monospace; font-size: clamp(10px,1.2vw,14px); display: flex; align-items: center; justify-content: center; cursor: pointer; text-transform: uppercase; transition: all 0.1s; }
  .kb-key.kbactive { background: rgba(0,164,220,0.18); border-color: #00a4dc; color: #00a4dc; transform: scale(1.08); }
  .kb-key.invisible { visibility: hidden; pointer-events: none; }
  .kb-key.confirm { border-color: rgba(0,164,220,0.3); color: rgba(0,164,220,0.65); }
  .kb-key.confirm.kbactive { background: rgba(0,164,220,0.22); border-color: #00a4dc; color: #00a4dc; }
  .kb-key.shift-on { border-color: rgba(255,200,0,0.5); color: rgba(255,200,0,0.8); }

  /* ── Animations XeLauncher (identiques au menu) ── */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spin   { to { transform: rotate(360deg); } }

  /* ── Xbox 360 press : écrase puis rebondit ── */
  @keyframes xb-press {
    0%   { transform: scale(1.08) translateY(-4px); }
    30%  { transform: scale(0.93) translateY(2px); }
    65%  { transform: scale(1.12) translateY(-6px); }
    85%  { transform: scale(1.06) translateY(-3px); }
    100% { transform: scale(1.08) translateY(-4px); }
  }

  /* ── Glow pulsé sur carte active (même style que les cartes menu) ── */
  @keyframes card-pulse {
    0%,100% { box-shadow: 0 0 28px rgba(0,164,220,0.38); }
    50%      { box-shadow: 0 0 52px rgba(0,164,220,0.65); }
  }

  /* ── Intro page ── */
  body { animation: fadeIn 0.5s ease-in both; }

  /* ── Carte active avec glow pulsé (remplace la règle existante) ── */
  .profile-card.active .avatar-wrap img {
    border-color: #00a4dc;
    box-shadow: 0 0 0 3px rgba(0,164,220,0.18), 0 0 28px rgba(0,164,220,0.38);
    animation: card-pulse 2s ease-in-out infinite;
  }

  /* ── Animation Xbox 360 sur la carte au moment de la sélection ── */
  .profile-card.pressing {
    animation: xb-press 0.38s cubic-bezier(0.36,0.07,0.19,0.97) forwards;
  }

</style>
</head>

var profiles = [];
var focusZone = 1; // 0=back, 1..N=profils, N+1=add

// ── Chargement ────────────────────────────────────────────────────────────────
function init() {
  window.xeLauncher.getProfiles().then(function(data) {
    SERVER = data.server || SERVER;
    profiles = data.profiles || [];
    renderProfiles();
  });
}

function getAvatarSrc(profile) {
  if (!profile.avatarData && profile.avatar === 'builtin_xelopteryx') return BUILTIN_AVATAR;
  if (profile.avatarData) return profile.avatarData;
  return BUILTIN_AVATAR;
}

// ── Rendu profils ─────────────────────────────────────────────────────────────
function renderProfiles() {
  var grid = document.getElementById('profilesGrid');
  grid.innerHTML = '';
  var total = profiles.length + 1; // +1 pour le bouton +

  profiles.forEach(function(p, i) {
    var card = document.createElement('div');
    var zone = i + 1;
    card.className = 'profile-card' + (focusZone === zone ? ' active' : ' inactive');
    card.id = 'profile-' + i;
    card.innerHTML = '<div class="avatar-wrap"><img src="' + getAvatarSrc(p) + '" alt="' + p.name + '"></div><span class="profile-name">' + p.name + '</span>';
    card.onclick = function() { focusZone = zone; renderProfiles(); confirmCurrent(); };
    grid.appendChild(card);
  });

  // Bouton +
  var addCard = document.createElement('div');
  addCard.className = 'profile-card profile-add' + (focusZone === profiles.length + 1 ? ' active' : ' inactive');
  addCard.id = 'profile-add';
  addCard.innerHTML = '<div class="avatar-wrap"><div class="avatar-placeholder"><span class="plus-icon">+</span></div></div><span class="profile-name">Ajouter</span>';
  addCard.onclick = function() { focusZone = profiles.length + 1; renderProfiles(); confirmCurrent(); };
  grid.appendChild(addCard);

  document.getElementById('backBtn').classList.toggle('active', focusZone === 0);
}

var launching = false;  // garde contre double-lancement

function confirmCurrent() {
  if (launching) return;
  if (focusZone === 0) { window.xeLauncher.goBack(); return; }
  if (focusZone === profiles.length + 1) { openEditor(null); return; }
  launching = true;
  var profile = profiles[focusZone - 1];
  // Effet Xbox 360 : press puis lancement
  var card = document.getElementById('profile-' + (focusZone - 1));
  if (card) {
    card.classList.add('pressing');
    setTimeout(function() { launchWithProfile(profile); }, 360);
  } else {
    launchWithProfile(profile);
  }
}

function editCurrent() {
  if (focusZone === 0 || focusZone === profiles.length + 1) return;
  openEditor(profiles[focusZone - 1]);
}

// ── Connexion ──────────────────────────────────────────────────────────────────
function launchWithProfile(profile) {
  showStatus('Connexion en cours...', false);
  window.xeLauncher.jellyfinAuthenticate(SERVER, profile.username, profile.password)
    .then(function(result) {
      if (!result.ok || !result.accessToken) {
        launching = false;
        showStatus('Erreur : ' + (result.error || 'Connexion refusée'), true);
        return;
      }
      showStatus('Bienvenue ' + profile.name + ' !', false);
      setTimeout(function() {
        window.xeLauncher.launchJellyfinWithToken(SERVER, result.accessToken, result.userId, result.serverId);
      }, 800);
    })
    .catch(function(e) { launching = false; showStatus('Erreur inattendue : ' + e.message, true); });
}

// ── Éditeur de profil ─────────────────────────────────────────────────────────
var editingProfile = null;
var editorFocus = 0; // 0=name, 1=username, 2=password, 3=boutons
var editorBtnFocus = 0; // 0=avatar, 1=save, 2=delete, 3=cancel
var editorFields = ['editorName','editorUsername','editorPassword'];
var editorBtns = ['editorAvatarBtn','editorSaveBtn','editorDeleteBtn','editorCancelBtn'];
var editorAvatarData = null;

function openEditor(profile) {
  editingProfile = profile ? JSON.parse(JSON.stringify(profile)) : {
    id: 'profile_' + Date.now(),
    name: '',
    username: '',
    password: '',
    avatar: 'builtin_xelopteryx',
    avatarData: null
  };
  editorAvatarData = editingProfile.avatarData || null;
  document.getElementById('editorTitle').textContent = profile ? 'Modifier — ' + profile.name : 'Nouveau profil';
  document.getElementById('editorName').textContent = editingProfile.name;
  document.getElementById('editorUsername').textContent = editingProfile.username;
  document.getElementById('editorPassword').textContent = editingProfile.password ? '••••••••' : '';
  document.getElementById('editorAvatarPreview').src = getAvatarSrc(editingProfile);
  // Masquer supprimer si nouveau profil
  document.getElementById('editorDeleteBtn').style.display = profile ? '' : 'none';
  editorFocus = 0;
  editorBtnFocus = 0;
  updateEditorFocus();
  document.getElementById('editorOverlay').classList.add('visible');
}

function closeEditor() {
  document.getElementById('editorOverlay').classList.remove('visible');
}

function updateEditorFocus() {
  editorFields.forEach(function(id, i) {
    document.getElementById(id).classList.toggle('focused', editorFocus === i);
  });
  editorBtns.forEach(function(id, i) {
    document.getElementById(id).classList.toggle('focused', editorFocus === 3 && editorBtnFocus === i);
  });
}

function editorConfirm() {
  if (editorFocus < 3) {
    var fieldNames = ['Nom affiché', 'Utilisateur Jellyfin', 'Mot de passe'];
    var keys = ['name', 'username', 'password'];
    var current = editingProfile[keys[editorFocus]] || '';
    openKb(fieldNames[editorFocus], current, function(val) {
      editingProfile[keys[editorFocus]] = val;
      document.getElementById(editorFields[editorFocus]).textContent = editorFocus === 2 ? '••••••••' : val;
    });
  } else {
    var deleteHidden = document.getElementById('editorDeleteBtn').style.display === 'none';
    var realIdx = editorBtnFocus;
    if (deleteHidden && realIdx >= 2) realIdx++; // skip delete slot
    if (realIdx === 0) { openAvatarPicker(); }
    else if (realIdx === 1) { saveCurrentProfile(); }
    else if (realIdx === 2) { deleteCurrentProfile(); }
    else { closeEditor(); }
  }
}

function saveCurrentProfile() {
  if (!editingProfile.name || !editingProfile.username) {
    showStatus('Nom et utilisateur requis', true); return;
  }
  if (editorAvatarData) editingProfile.avatarData = editorAvatarData;
  window.xeLauncher.saveProfile(editingProfile).then(function() {
    closeEditor();
    init();
    showStatus('Profil sauvegardé', false);
  });
}

function deleteCurrentProfile() {
  window.xeLauncher.deleteProfile(editingProfile.id).then(function() {
    closeEditor();
    init();
    showStatus('Profil supprimé', false);
  });
}

// ── Sélecteur d'avatar ────────────────────────────────────────────────────────
var avatarList = [];
var avatarFocusIdx = 0;

function openAvatarPicker() {
  window.xeLauncher.getAvatars().then(function(files) {
    avatarList = files;
    avatarFocusIdx = 0;
    var grid = document.getElementById('avatarGrid');
    grid.innerHTML = '';
    if (!files.length) {
      grid.innerHTML = '<div class="avatar-empty">Aucun avatar dans ~/xelauncher/avatars/</div>';
    } else {
      files.forEach(function(file, i) {
        window.xeLauncher.getAvatarData(file).then(function(data) {
          if (!data) return;
          var img = document.createElement('img');
          img.className = 'avatar-thumb' + (i === avatarFocusIdx ? ' focused' : '');
          img.src = data;
          img.dataset.idx = i;
          img.dataset.src = data;
          img.onclick = function() { selectAvatar(data); };
          grid.appendChild(img);
        });
      });
    }
    document.getElementById('avatarPicker').classList.add('visible');
  });
}

function updateAvatarPickerFocus() {
  var thumbs = document.querySelectorAll('.avatar-thumb');
  thumbs.forEach(function(t, i) { t.classList.toggle('focused', i === avatarFocusIdx); });
}

function selectAvatar(data) {
  editorAvatarData = data;
  document.getElementById('editorAvatarPreview').src = data;
  document.getElementById('avatarPicker').classList.remove('visible');
}

// ── Clavier virtuel ───────────────────────────────────────────────────────────
var kbVal = '', kbMode = 'letters', kbCaps = false;
var kbSection = 'kb', kbTopFocus = 0, kbRow = 0, kbCol = 0;
var kbCallback = null;
var KB_COLS = 10;
var KB_LAYOUTS = {
  letters: [
    ['a','z','e','r','t','y','u','i','o','p'],
    ['q','s','d','f','g','h','j','k','l','m'],
    [null,'w','x','c','v','b','n',',','.',null]
  ],
  nums: [
    ['1','2','3','4','5','6','7','8','9','0'],
    ['!','@','#','$','%','^','&','*','(',')'],
    [null,'-','_','=','+','[',']','{','}',null]
  ]
};
var KB_BOTTOM = [{label:'SHIFT',col:0,span:2},{label:'ESPACE',col:2,span:4},{label:'<',col:6,span:2},{label:'OK',col:8,span:2}];

function openKb(label, initial, callback) {
  kbVal = initial || '';
  kbMode = 'letters'; kbCaps = false;
  kbSection = 'kb'; kbRow = 0; kbCol = 0; kbTopFocus = 0;
  kbCallback = callback;
  document.getElementById('kbLabel').textContent = label;
  document.getElementById('kbDisplay').textContent = kbVal + '|';
  document.getElementById('kbOverlay').classList.add('visible');
  renderKb();
}

function closeKb() { document.getElementById('kbOverlay').classList.remove('visible'); }

function kbNearestCol(ri, col) {
  var layout = KB_LAYOUTS[kbMode];
  if (ri === layout.length) {
    var best=0,bestD=999;
    KB_BOTTOM.forEach(function(b){ var mid=b.col+Math.floor(b.span/2); var d=Math.abs(mid-col); if(d<bestD){bestD=d;best=b.col;} });
    return best;
  }
  var row=layout[ri]; if(row[col]!==null) return col;
  var best=col,bestD=999;
  for(var c=0;c<KB_COLS;c++){ if(row[c]!==null){ var d=Math.abs(c-col); if(d<bestD){bestD=d;best=c;} } }
  return best;
}

function renderKb() {
  var layout = KB_LAYOUTS[kbMode];
  var container = document.getElementById('kbRows'); container.innerHTML = '';
  layout.forEach(function(row, ri) {
    var rowEl = document.createElement('div');
    rowEl.className = 'kb-row'; rowEl.style.gridTemplateColumns = 'repeat(10,1fr)';
    row.forEach(function(key, ci) {
      var btn = document.createElement('div');
      var isActive = kbSection==='kb' && kbRow===ri && kbCol===ci;
      btn.className = 'kb-key' + (key===null?' invisible':'') + (isActive?' kbactive':'');
      if (key!==null) btn.textContent = kbCaps&&key.length===1 ? key.toUpperCase() : key;
      if (key!==null) (function(r,c){ btn.onclick=function(){ kbSection='kb';kbRow=r;kbCol=c;kbPressKey(); }; })(ri,ci);
      rowEl.appendChild(btn);
    });
    container.appendChild(rowEl);
  });
  var bottomEl = document.createElement('div');
  bottomEl.className = 'kb-row'; bottomEl.style.gridTemplateColumns = 'repeat(10,1fr)';
  var bri = layout.length;
  KB_BOTTOM.forEach(function(b, bi) {
    var btn = document.createElement('div');
    var isActive = kbSection==='kb' && kbRow===bri && kbCol===b.col;
    btn.className = 'kb-key' + (b.label==='OK'?' confirm':'') + (b.label==='SHIFT'&&kbCaps?' shift-on':'') + (isActive?' kbactive':'');
    btn.style.gridColumn = (b.col+1)+'/span '+b.span;
    btn.textContent = b.label;
    (function(bidx){ btn.onclick=function(){ kbSection='kb';kbRow=bri;kbCol=KB_BOTTOM[bidx].col;kbPressBottom(bidx); }; })(bi);
    bottomEl.appendChild(btn);
  });
  container.appendChild(bottomEl);
  document.getElementById('kbModeLetters').className = 'kb-mode-btn' + (kbMode==='letters'?' on':'') + (kbSection==='top'&&kbTopFocus===0?' kbactive':'');
  document.getElementById('kbModeNums').className = 'kb-mode-btn' + (kbMode==='nums'?' on':'') + (kbSection==='top'&&kbTopFocus===1?' kbactive':'');
}

function kbPressKey() {
  var layout = KB_LAYOUTS[kbMode];
  if (kbRow === layout.length) {
    var bi=0; KB_BOTTOM.forEach(function(b,i){ if(kbCol>=b.col&&kbCol<b.col+b.span) bi=i; });
    kbPressBottom(bi); return;
  }
  var key = layout[kbRow][kbCol];
  if (key) kbVal += kbCaps ? key.toUpperCase() : key;
  document.getElementById('kbDisplay').textContent = kbVal + '|';
  renderKb();
}

function kbPressBottom(bi) {
  if (KB_BOTTOM[bi].label==='SHIFT') { kbCaps=!kbCaps; }
  else if (KB_BOTTOM[bi].label==='ESPACE') { kbVal+=' '; }
  else if (KB_BOTTOM[bi].label==='<') { kbVal=kbVal.slice(0,-1); }
  else if (KB_BOTTOM[bi].label==='OK') {
    if (kbCallback) kbCallback(kbVal);
    closeKb(); return;
  }
  document.getElementById('kbDisplay').textContent = kbVal + '|';
  renderKb();
}

function kbSetMode(m) { kbMode=m; kbSection='kb'; kbRow=0; kbCol=kbNearestCol(0,0); renderKb(); }
document.getElementById('kbModeLetters').onclick = function(){ kbSetMode('letters'); };
document.getElementById('kbModeNums').onclick = function(){ kbSetMode('nums'); };

// ── Status ────────────────────────────────────────────────────────────────────
function showStatus(msg, isError) {
  var el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg show' + (isError ? ' error' : '');
  if (!isError) { clearTimeout(el._t); el._t = setTimeout(function() { el.classList.remove('show'); }, 2500); }
}

// ── Navigation unifiée ────────────────────────────────────────────────────────
function handleKey(key) {
  var totalZones = profiles.length + 2; // 0=back, 1..N=profils, N+1=add

  // Priorité 1 : clavier virtuel
  if (document.getElementById('kbOverlay').classList.contains('visible')) {
    var layout = KB_LAYOUTS[kbMode], maxRow = layout.length;
    if (key==='ArrowUp') {
      if (kbSection==='kb'&&kbRow===0) kbSection='top';
      else if (kbSection==='kb') { kbRow--; kbCol=kbNearestCol(kbRow,kbCol); }
      renderKb();
    } else if (key==='ArrowDown') {
      if (kbSection==='top') { kbSection='kb'; kbRow=0; kbCol=kbNearestCol(0,kbCol); }
      else if (kbRow<maxRow) { kbRow++; kbCol=kbNearestCol(kbRow,kbCol); }
      renderKb();
    } else if (key==='ArrowLeft') {
      if (kbSection==='top') { kbTopFocus=(kbTopFocus-1+2)%2; }
      else if (kbRow===maxRow) { var bi=0;KB_BOTTOM.forEach(function(b,i){if(kbCol>=b.col&&kbCol<b.col+b.span)bi=i;});kbCol=KB_BOTTOM[(bi-1+KB_BOTTOM.length)%KB_BOTTOM.length].col; }
      else { var nc=(kbCol-1+KB_COLS)%KB_COLS,tr=0; while(layout[kbRow][nc]===null&&tr<KB_COLS){nc=(nc-1+KB_COLS)%KB_COLS;tr++;} kbCol=nc; }
      renderKb();
    } else if (key==='ArrowRight') {
      if (kbSection==='top') { kbTopFocus=(kbTopFocus+1)%2; }
      else if (kbRow===maxRow) { var bi=0;KB_BOTTOM.forEach(function(b,i){if(kbCol>=b.col&&kbCol<b.col+b.span)bi=i;});kbCol=KB_BOTTOM[(bi+1)%KB_BOTTOM.length].col; }
      else { var nc=(kbCol+1)%KB_COLS,tr=0; while(layout[kbRow][nc]===null&&tr<KB_COLS){nc=(nc+1)%KB_COLS;tr++;} kbCol=nc; }
      renderKb();
    } else if (key==='Enter') {
      if (kbSection==='top') kbSetMode(kbTopFocus===0?'letters':'nums');
      else kbPressKey();
    } else if (key==='Escape') { closeKb(); }
    return;
  }

  // Priorité 2 : sélecteur d'avatar
  if (document.getElementById('avatarPicker').classList.contains('visible')) {
    var thumbs = document.querySelectorAll('.avatar-thumb');
    var cols = Math.floor(document.getElementById('avatarGrid').offsetWidth / (thumbs[0] ? thumbs[0].offsetWidth + 16 : 100)) || 4;
    if (key==='ArrowLeft') { avatarFocusIdx=Math.max(0,avatarFocusIdx-1); updateAvatarPickerFocus(); }
    else if (key==='ArrowRight') { avatarFocusIdx=Math.min(thumbs.length-1,avatarFocusIdx+1); updateAvatarPickerFocus(); }
    else if (key==='ArrowUp') { avatarFocusIdx=Math.max(0,avatarFocusIdx-cols); updateAvatarPickerFocus(); }
    else if (key==='ArrowDown') { avatarFocusIdx=Math.min(thumbs.length-1,avatarFocusIdx+cols); updateAvatarPickerFocus(); }
    else if (key==='Enter') { if(thumbs[avatarFocusIdx]) selectAvatar(thumbs[avatarFocusIdx].src); }
    else if (key==='Escape') { document.getElementById('avatarPicker').classList.remove('visible'); }
    return;
  }

  // Priorité 3 : éditeur de profil
  if (document.getElementById('editorOverlay').classList.contains('visible')) {
    var deleteHidden = document.getElementById('editorDeleteBtn').style.display === 'none';
    var maxBtnFocus = deleteHidden ? 2 : 3; // 0=avatar,1=save,(2=delete),3=cancel
    if (key==='ArrowUp') {
      if (editorFocus > 0) { editorFocus--; updateEditorFocus(); }
    }
    else if (key==='ArrowDown') {
      if (editorFocus < 3) { editorFocus++; updateEditorFocus(); }
    }
    else if (key==='ArrowLeft') {
      if (editorFocus === 3) { editorBtnFocus=Math.max(0,editorBtnFocus-1); updateEditorFocus(); }
    }
    else if (key==='ArrowRight') {
      if (editorFocus === 3) { editorBtnFocus=Math.min(maxBtnFocus,editorBtnFocus+1); updateEditorFocus(); }
    }
    else if (key==='Enter') { editorConfirm(); }
    else if (key==='Escape') { closeEditor(); }
    return;
  }

  // Priorité 4 : écran principal profils
  if (key==='ArrowUp') { if (focusZone>0) { focusZone=0; renderProfiles(); } }
  else if (key==='ArrowDown') { if (focusZone===0) { focusZone=1; renderProfiles(); } }
  else if (key==='ArrowLeft') {
    if (focusZone>1) { focusZone--; renderProfiles(); }
    else if (focusZone===1) { focusZone=profiles.length+1; renderProfiles(); }
  }
  else if (key==='ArrowRight') {
    if (focusZone>0 && focusZone<profiles.length+1) { focusZone++; renderProfiles(); }
    else if (focusZone===profiles.length+1) { focusZone=1; renderProfiles(); }
  }
  else if (key==='Enter') { confirmCurrent(); }
  else if (key==='Triangle') { editCurrent(); }
  else if (key==='Escape') { window.xeLauncher.goBack(); }
}

var inputReady = false; setTimeout(function(){ inputReady = true; }, 800);
document.addEventListener('keydown', function(e) {
  if(!inputReady) return;
  if (e.key==='Delete'||e.key==='F1') handleKey('Triangle');
  else handleKey(e.key);
});

// Gamepad
var gamepadState = {};
var gpPollingProfiles = false;

function startGpPollProfiles(){
  if(gpPollingProfiles) return;
  gpPollingProfiles = true;
  requestAnimationFrame(pollGamepad);
}

function pollGamepad() {
  var gps = navigator.getGamepads ? navigator.getGamepads() : [];
  for (var i=0;i<gps.length;i++) {
    var gp=gps[i]; if(!gp) continue;
    if(!gamepadState[i]) gamepadState[i]={buttons:[],acH:false,acV:false};
    var st=gamepadState[i];
    gp.buttons.forEach(function(btn,idx) {
      var p=btn.pressed,w=st.buttons[idx];
      if(p&&!w&&inputReady){
        if(idx===0) handleKey('Enter');
        if(idx===1) handleKey('Escape');
        if(idx===3) handleKey('Triangle');
        // idx 12-15 (D-pad HAT) gérés exclusivement via evdev IPC
      }
      st.buttons[idx]=p;
    });
    var T=0.4;
    var axH=0, axVraw=0;
    if(Math.abs(gp.axes[0])>T) axH=gp.axes[0];
    else if(gp.axes[6]!==undefined&&Math.abs(gp.axes[6])>T) axH=gp.axes[6];
    if(Math.abs(gp.axes[1])>T) axVraw=gp.axes[1];
    else if(gp.axes[7]!==undefined&&Math.abs(gp.axes[7])>T) axVraw=gp.axes[7];
    if(!st.acH){
      if(axH<-T){ handleKey('ArrowLeft');  st.acH=true; setTimeout(function(){st.acH=false;},200); }
      else if(axH>T){ handleKey('ArrowRight'); st.acH=true; setTimeout(function(){st.acH=false;},200); }
    }
    if(axH===0) st.acH=false;
    if(!st.acV){
      if(axVraw<-T){ handleKey('ArrowUp');   st.acV=true; setTimeout(function(){st.acV=false;},200); }
      else if(axVraw>T){ handleKey('ArrowDown'); st.acV=true; setTimeout(function(){st.acV=false;},200); }
    }
    if(axVraw===0) st.acV=false;
  }
  requestAnimationFrame(pollGamepad);
}
window.addEventListener('gamepadconnected',function(e){
  gamepadState[e.gamepad.index]={buttons:[],acH:false,acV:false};
  startGpPollProfiles();
});
window.addEventListener('gamepaddisconnected',function(e){
  delete gamepadState[e.gamepad.index];
});
setTimeout(startGpPollProfiles, 500);

// Wiimote D-pad via evdev IPC (croix non visible par l'API Gamepad)
if(window.xeLauncher && window.xeLauncher.onWiimoteDpad){
  window.xeLauncher.onWiimoteDpad(function(evt){ if(inputReady) handleKey(evt.key); });
}

document.getElementById('backBtn').onclick = function(){ window.xeLauncher.goBack(); };
document.getElementById('editorAvatarBtn').onclick = function(){ openAvatarPicker(); };
document.getElementById('editorSaveBtn').onclick = function(){ saveCurrentProfile(); };
document.getElementById('editorDeleteBtn').onclick = function(){ deleteCurrentProfile(); };
document.getElementById('editorCancelBtn').onclick = function(){ closeEditor(); };

init();
</script>
